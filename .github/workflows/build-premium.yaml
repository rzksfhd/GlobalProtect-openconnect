name: Build GPConnect Premium

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

env:
  UPSTREAM_REPO: yuezk/GlobalProtect-openconnect

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev autoconf automake libtool libgnutls28-dev libxml2-dev zlib1g-dev
      
      - name: Build CLI tools
        run: |
          cargo build --release -p gpclient -p gpservice -p gpauth
      
      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/gpclient dist/
          cp target/release/gpservice dist/
          cp target/release/gpauth dist/
          tar -czvf gpconnect-premium-cli-x86_64.tar.gz -C dist .
          sha256sum gpconnect-premium-cli-x86_64.tar.gz > gpconnect-premium-cli-x86_64.tar.gz.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: gpconnect-cli-x86_64
          path: |
            gpconnect-premium-cli-x86_64.tar.gz
            gpconnect-premium-cli-x86_64.tar.gz.sha256

  build-gui-helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev autoconf automake libtool libgnutls28-dev libxml2-dev zlib1g-dev
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build GUI Helper
        working-directory: apps/gpgui-helper
        run: |
          pnpm install
          pnpm tauri build --no-bundle
      
      - name: Package GUI Helper
        run: |
          mkdir -p dist
          cp target/release/gpgui-helper dist/
          tar -czvf gpconnect-premium-gui-helper-x86_64.tar.gz -C dist .
          sha256sum gpconnect-premium-gui-helper-x86_64.tar.gz > gpconnect-premium-gui-helper-x86_64.tar.gz.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: gpconnect-gui-helper-x86_64
          path: |
            gpconnect-premium-gui-helper-x86_64.tar.gz
            gpconnect-premium-gui-helper-x86_64.tar.gz.sha256

  build-gpgui:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare workspace
        run: |
          rm -rf gpgui-build
          mkdir -p gpgui-build/artifacts
      
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          path: gpgui-build/gp
      
      - name: Download gpgui binary from upstream
        id: download-upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd gpgui-build
          
          # Try to download binary and checksum from upstream
          if gh -R ${{ env.UPSTREAM_REPO }} release download snapshot \
            --pattern 'gpgui_x86_64.bin.tar.xz' \
            --pattern 'gpgui_x86_64.bin.tar.xz.sha256' \
            --dir .; then
            echo "::notice::Downloaded gpgui from upstream"
            echo "downloaded=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Failed to download gpgui from upstream"
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Verify checksum of downloaded binary
        if: steps.download-upstream.outputs.downloaded == 'true'
        run: |
          cd gpgui-build
          
          # Verify checksum
          if [ -f gpgui_x86_64.bin.tar.xz.sha256 ]; then
            echo "Verifying checksum..."
            
            # Read expected hash (upstream format: just the hash, no filename)
            EXPECTED_HASH=$(cat gpgui_x86_64.bin.tar.xz.sha256 | tr -d '[:space:]')
            
            # Calculate actual hash
            ACTUAL_HASH=$(sha256sum gpgui_x86_64.bin.tar.xz | cut -d' ' -f1)
            
            if [ "$EXPECTED_HASH" = "$ACTUAL_HASH" ]; then
              echo "::notice::Checksum verified successfully"
            else
              echo "::error::Checksum verification failed!"
              echo "Expected: $EXPECTED_HASH"
              echo "Actual:   $ACTUAL_HASH"
              exit 1
            fi
          else
            echo "::warning::No checksum file found, skipping verification"
          fi
      
      - name: Build gpgui in Docker (optional)
        if: steps.download-upstream.outputs.downloaded != 'true'
        continue-on-error: true
        run: |
          cd gpgui-build
          
          # Try to build using upstream docker image
          docker run --pull=always --rm \
            -e COREPACK_INTEGRITY_KEYS=0 \
            -v $(pwd):/workspace \
            ${{ env.UPSTREAM_REPO }}/gpdev:gpgui-builder-tauri2
          
          # Check if build succeeded
          if [ -f gpgui_*.bin.tar.xz ]; then
            echo "::notice::Docker build succeeded"
          else
            echo "::error::Both download and docker build failed"
            exit 1
          fi
      
      - name: Package gpgui
        run: |
          cd gpgui-build
          
          # Clean artifacts directory
          rm -rf artifacts/*
          
          # Copy binary to artifacts
          if [ -f gpgui_x86_64.bin.tar.xz ]; then
            cp gpgui_x86_64.bin.tar.xz artifacts/
            if [ -f gpgui_x86_64.bin.tar.xz.sha256 ]; then
              cp gpgui_x86_64.bin.tar.xz.sha256 artifacts/
            else
              cd artifacts && sha256sum gpgui_x86_64.bin.tar.xz > gpgui_x86_64.bin.tar.xz.sha256
            fi
            echo "::notice::gpgui packaged successfully"
          else
            echo "::error::No gpgui binary found"
            exit 1
          fi
      
      - uses: actions/upload-artifact@v4
        with:
          name: gpconnect-gpgui-x86_64
          path: gpgui-build/artifacts/*
          if-no-files-found: error

  release:
    needs: [build-cli, build-gui-helper, build-gpgui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          echo "Artifacts to release:"
          find artifacts -type f -name "*.tar.gz" -o -name "*.tar.xz" -o -name "*.sha256"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.tar.xz
            artifacts/*/*.sha256
          generate_release_notes: true
