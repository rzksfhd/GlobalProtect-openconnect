name: Build GPConnect Premium

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev autoconf automake libtool libgnutls28-dev libxml2-dev zlib1g-dev
      
      - name: Build CLI tools
        run: |
          cargo build --release -p gpclient -p gpservice -p gpauth
      
      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/gpclient dist/
          cp target/release/gpservice dist/
          cp target/release/gpauth dist/
          tar -czvf gpconnect-premium-cli-x86_64.tar.gz -C dist .
      
      - uses: actions/upload-artifact@v4
        with:
          name: gpconnect-cli-x86_64
          path: gpconnect-premium-cli-x86_64.tar.gz

  build-gui-helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev autoconf automake libtool libgnutls28-dev libxml2-dev zlib1g-dev
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build GUI Helper
        working-directory: apps/gpgui-helper
        run: |
          pnpm install
          pnpm tauri build --no-bundle
      
      - name: Package GUI Helper
        run: |
          mkdir -p dist
          cp target/release/gpgui-helper dist/
          tar -czvf gpconnect-premium-gui-helper-x86_64.tar.gz -C dist .
      
      - uses: actions/upload-artifact@v4
        with:
          name: gpconnect-gui-helper-x86_64
          path: gpconnect-premium-gui-helper-x86_64.tar.gz

  release:
    needs: [build-cli, build-gui-helper]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.tar.gz
          generate_release_notes: true
